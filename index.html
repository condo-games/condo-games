<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Roblox Condo Maps, private Roblox servers, fun combat games, neko maps and multiplayer experiences. Play Roblox maps and games with friends.">

<title>Roblox Condo Maps</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root {
--primary: #AD00FF;
--secondary: #FA00FF;
--discord: #5865F2;
--dark: #0a0e27;
--darker: #050811;
--accent: #FF006E;
--pink: #FF1493;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background-color:var(--darker);
background-image:
radial-gradient(circle at 20% 50%, rgba(173,0,255,0.1), transparent 50%),
radial-gradient(circle at 80% 80%, rgba(88,101,242,0.1), transparent 50%),
url('https://i.postimg.cc/vmYQqsj5/Zrzut-ekranu-2026-03-05-205546.png');
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
overflow-x:hidden;
}

.container{
text-align:center;
max-width:550px;
padding:40px 20px;
animation:fadeIn .6s ease-out;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.title{
font-family:'Agbalumo';
font-size:3rem;
text-shadow:0 0 30px var(--primary);
margin-bottom:15px;
}

.subtitle{
color:#ccc;
margin-bottom:35px;
}

.buttons{
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
display:block;
padding:15px;
border-radius:12px;
background:rgba(255,255,255,0.05);
border:2px solid var(--primary);
color:var(--secondary);
font-family:'Agbalumo';
text-decoration:none;
backdrop-filter:blur(10px);
}

.footer{
margin-top:40px;
opacity:.6;
font-size:.8rem;
letter-spacing:2px;
}

</style>
</head>

<body>

<main class="container">

<h1 class="title">Roblox Condo</h1>
<p class="subtitle">🎮 Maps & Games 🎮</p>

<nav class="buttons">

<a href="" class="btn">⚔️ Fun–Combat</a>

<a href="" class="btn">😼🔥 Sus Neko</a>

<a href="" class="btn">🔥 Neko Hō</a>

<a href="" class="btn">❤️ 100 Players</a>

</nav>

<footer class="footer">
Condo Roblox © 2025
</footer>

</main>

</body>
</html>
