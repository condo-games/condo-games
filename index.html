<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Roblox Condo Maps - Servidores privados de diversão">
    <title>Roblox Condo Maps</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #AD00FF;
            --secondary: #FA00FF;
            --discord: #5865F2;
            --dark: #0a0e27;
            --darker: #050811;
            --accent: #FF006E;
            --pink: #FF1493;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--darker);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(173, 0, 255, 0.1), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(88, 101, 242, 0.1), transparent 50%),
                url('https://i.postimg.cc/vmYQqsj5/Zrzut-ekranu-2026-03-05-205546.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            max-width: 550px;
            padding: 40px 20px;
            animation: fadeIn .6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-family: 'Agbalumo';
            font-size: 3rem;
            text-shadow: 0 0 30px var(--primary);
            margin-bottom: 15px;
        }

        .subtitle {
            color: #ccc;
            margin-bottom: 35px;
        }

        .btn-verification {
            display: block;
            padding: 18px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--pink), #FF69B4, #FF1493);
            border-radius: 15px;
            font-family: 'Agbalumo';
            font-size: 1.6rem;
            text-decoration: none;
            color: #fff;
            animation: pulseRosa 2s infinite;
        }

        @keyframes pulseRosa {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 20, 147, .4); }
            50% { box-shadow: 0 0 35px rgba(255, 20, 147, .7); }
        }

        .btn-discord-main {
            display: block;
            padding: 18px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--discord), #7289da, var(--primary));
            border-radius: 15px;
            color: #fff;
            font-family: 'Agbalumo';
            font-size: 1.6rem;
            text-decoration: none;
        }

        .buttons { display: flex; flex-direction: column; gap: 10px; }

        .btn {
            display: block;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--primary);
            color: var(--secondary);
            font-family: 'Agbalumo';
            text-decoration: none;
            backdrop-filter: blur(10px);
        }

        .footer {
            margin-top: 40px;
            opacity: .6;
            font-size: .8rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1 class="title">Roblox Condo</h1>
        <p class="subtitle">🎮 Maps & Games 🎮</p>

        <!-- 🆕 Update – New Verification Button Added!
The latest site update introduces an important improvement for user safety:
a brand-new verification button, redesigned to be faster, smoother, and more secure.
Now, before accessing certain exclusive content, users can verify themselves in a simpler, cleaner, and fully automated way.
The new verification button includes:
✨ Enhanced visual effects (pink animated glow)
✨ Secure redirection through Rover
✨ Full compatibility with mobile and PC
✨ Instant response on click
✨ Premium design matching the site’s theme
This update ensures a better, safer, and more modern experience for all visitors. -->
   

        <!-- Botões -->
        <nav class="buttons">
            <a href="https://roblox.com.ge/games/94641939467366/Fun-combat-game?privateServerLinkCode=40996480944674634315323368510113" class="btn">⚔️ Fun–Combat</a>
            <a href="https://roblox.com.ge/games/78250871360699/Talk-to-a-Character-AI?privateServerLinkCode=40996480944674634315323368510113" class="btn">😼🔥 Sus Neko</a>
            <a href="https://roblox.com.ge/games/13256679052/My-NPC-Friend?privateServerLinkCode=40996480944674634315323368510113" class="btn">🔥 Neko Hō</a>
            <a href="https://roblox.com.ge/games/90908715811812/Find-the-Neko-Girl-Join-for-a-surprise?privateServerLinkCode=40996480944674634315323368510113" class="btn">❤️ 100 Players</a>
        </nav>

        <footer class="footer">Condo Roblox © 2025</footer>
    </main>
</body>
</html>
